<!DOCTYPE html>
<html>
<head>

<title>Career Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#2563eb,#7c3aed);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.result-card{
background:white;
padding:40px;
border-radius:20px;
width:600px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

</style>

</head>

<body>

<div class="result-card">

<h1>🎯 Career Prediction Result</h1>

<h2 class="text-primary">
{{ career }}
</h2>

<hr>

<h4>Career Match Score</h4>

<div class="progress">

<div class="progress-bar bg-success"
style="width:92%">
92%
</div>

</div>

<br>

<a href="/dashboard"
class="btn btn-primary">

Dashboard

</a>

<a href="/"
class="btn btn-secondary">

Back

</a>

</div>

{% if session.user_id %}
{% include 'chatbot_widget.html' %}
{% endif %}

</body>
</html>
